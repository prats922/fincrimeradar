name: Sanctions Delta Tracker

# DISABLED 2026-07-20: OpenSanctions cuts off the unauthenticated bulk
# data endpoint (data.opensanctions.org) on 2026-08-01. generate_delta_pages.py
# fetches DATASET_URL directly from that endpoint with no API key, so this
# job would start failing every morning from that date onward with no one
# watching for it. Scheduled trigger removed proactively rather than left
# to fail silently forever. workflow_dispatch is kept so this can still be
# run manually (e.g. for one-off testing once/if a migration to the
# authenticated OpenSanctions API lands in generate_delta_pages.py).
# This was a deliberate removal, not an accidental drift, re-add the
# schedule block below once that migration is confirmed working.
#   schedule:
#     - cron: "0 6 * * *"
on:
  workflow_dispatch:
    inputs:
      max_sane_changes_override:
        description: "One time threshold override for a confirmed, evidence based anomaly. Leave blank for the standing default of 8000."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate delta pages
        env:
          MAX_SANE_CHANGES_OVERRIDE: ${{ github.event.inputs.max_sane_changes_override }}
        run: python scripts/generate_delta_pages.py

      - name: Validate generated HTML
        run: python scripts/validate_output.py

      - name: Commit and push if there are changes
        run: |
          git config user.name "fincrimeradar-bot"
          git config user.email "bot@fincrimeradar.org"
          git add delta/ data/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No sanctions changes today. Nothing to publish."
          else
            git commit -m "Delta tracker: $(date -u +%F) watchlist changes"
            git push
          fi
